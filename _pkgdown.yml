url: https://luciasouto13.github.io/mcstprules/
template:
  bootstrap: 5
  includes:
    in_header: |
      <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
      <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
navbar:
  structure:
    left:
    - intro
    - reference
    - demo
    right:
    - github
    - manual
  components:
    demo:
      text: Demos
      menu:
      - text: Basic Rules
        href: articles/basic_rules.html
      - text: Analysis Tools
        href: articles/analysis_tools.html
      - text: Scalability
        href: articles/scalability.html
      - text: Source Code (.R files)
        href: https://github.com/luciasouto13/mcstprules/tree/master/demo
    manual:
      text: PDF Manual
      href: mcstprules_0.1.0.pdf
reference:
- title: Package Overview
  desc: General information about the implemented rules and analysis tools.
  contents: mcstRules
- title: Algorithmic & Decomposition Rules
  desc: Rules based on Prim, Kruskal, Boruvka, and cone-wise decomposition.
  contents:
  - mcstBird
  - mcstDuttaKar
  - mcstFolk
  - mcstOWShapley
  - mcstPWShapley
  - mcstBoruvka
  - mcstCone
- title: Cooperative Games
  desc: Cost allocations based on the Shapley value or Nucleolus of associated cooperative
    games.
  contents:
  - mcstGamePrivate
  - mcstKar
  - mcstGameIrred
  - mcstGameOpt
  - mcstGamePublic
  - mcstGameCC
- title: Analysis Tools
  desc: Tools to evaluate core stability, geometric properties, sensitivity, and compare
    allocations.
  contents:
  - mcstCoreCheck
  - mcstCorePoints
  - mcstCorePlot
  - mcstStabilityRange
  - mcstSensitivity
  - mcstCompare

